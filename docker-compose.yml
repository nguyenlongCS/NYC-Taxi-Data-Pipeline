services:
  postgres:
    image: postgres:16-alpine
    container_name: taxi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: taxi_user
      POSTGRES_PASSWORD: taxi_pass
      POSTGRES_DB: taxi_dwh
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Các file .sql trong ./sql sẽ tự chạy theo thứ tự tên file
      # khi container khởi tạo lần đầu (chỉ chạy 1 lần, khi volume rỗng).
      - ./sql:/docker-entrypoint-initdb.d

  pgadmin:
    image: dpage/pgadmin4
    container_name: taxi_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  metabase:
    image: metabase/metabase:latest
    container_name: taxi_metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    depends_on:
      - postgres

volumes:
  pgdata:
  metabase_data:
  pgadmin_data: