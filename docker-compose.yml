services:
  postgres:
    image: postgres:16-alpine
    container_name: taxi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: taxi_user
      POSTGRES_PASSWORD: taxi_pass
      POSTGRES_DB: taxi_dwh
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Các file .sql trong ./sql sẽ tự chạy theo thứ tự tên file
      # khi container khởi tạo lần đầu (chỉ chạy 1 lần, khi volume rỗng).
      - ./sql:/docker-entrypoint-initdb.d

  pgadmin:
    image: dpage/pgadmin4
    container_name: taxi_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  metabase:
    image: metabase/metabase:latest
    container_name: taxi_metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    depends_on:
      - postgres

  # ------------------------------------------------------------
  # Spark — giai đoạn "Extract & Clean" (xem docs/roadmap.md, luồng 1-2)
  # Local mode (local[*]), không tách master/worker — đủ dùng cho khối
  # lượng dữ liệu hiện tại (2 file, ~3.5GB).
  # Không phụ thuộc Postgres: bước này chỉ đọc CSV -> ghi Parquet.
  # Nạp Parquet vào staging là bước riêng, chạy bằng
  # load_parquet_to_staging.py trên máy host (xem docs/pipeline.md).
  #
  # ⚠️ Dùng Docker Official Image `spark` (tag `python3`, có sẵn PySpark),
  # KHÔNG dùng `bitnami/spark` — Bitnami đã ngừng phát hành tag miễn phí
  # cho image này từ giữa 2025 (repo public giờ "No tags available",
  # image đầy đủ chỉ dành cho khách hàng trả phí "Bitnami Secure Images").
  # Xem docs/troubleshooting.md mục 12 để biết chi tiết lỗi đã gặp.
  # ------------------------------------------------------------
  spark:
    image: spark:python3
    container_name: taxi_spark
    restart: "no"
    volumes:
      - ./raw_data:/opt/spark_data/raw_data:ro
      - ./spark_jobs:/opt/spark_data/spark_jobs:ro
      - ./processed_data:/opt/spark_data/processed_data
    # Container không cần chạy nền — dùng lệnh `docker compose run` để thực thi job
    # theo yêu cầu (xem dbt/README.md kiểu tương tự cho cách chạy job dbt).
    command: [ "sleep", "infinity" ]

volumes:
  pgdata:
  metabase_data:
  pgadmin_data: