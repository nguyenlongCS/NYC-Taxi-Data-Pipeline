services:
  postgres:
    image: postgres:16-alpine
    container_name: taxi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Container luôn lắng nghe ở cổng 5432 (mặc định của image Postgres,
      # không phải "giá trị cấu hình" nên để nguyên) -- chỉ cổng phía HOST
      # là lấy từ .env.
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - taxi_net

  # profiles: ["tools"] -- KHÔNG tự khởi động khi chạy "docker compose up -d"
  # (mặc định). pgAdmin không tham gia luồng ETL/Airflow, chỉ dùng khi bạn
  # muốn tự tay xem/query DB -- tắt mặc định để dành RAM cho Airflow +
  # Postgres + các container Spark/loader/dbt mà DockerOperator tự tạo.
  # Muốn dùng: docker compose --profile tools up -d
  pgadmin:
    image: dpage/pgadmin4
    container_name: taxi_pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_HOST_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - taxi_net

  # profiles: ["tools"] -- cùng lý do như pgAdmin: Metabase (JVM, thường là
  # container NẶNG NHẤT trong nhóm không cần thiết) chỉ dùng để làm dashboard
  # SAU KHI đã có dữ liệu, không tham gia lúc Airflow chạy DAG.
  # Muốn dùng: docker compose --profile tools up -d
  metabase:
    image: metabase/metabase:latest
    container_name: taxi_metabase
    restart: unless-stopped
    profiles: ["tools"]
    ports:
      - "${METABASE_HOST_PORT}:3000"
    volumes:
      - metabase_data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    depends_on:
      - postgres
    networks:
      - taxi_net

  spark:
    image: spark:python3
    container_name: taxi_spark
    restart: "no"
    volumes:
      - ./raw_data:/opt/spark_data/raw_data:ro
      - ./spark_jobs:/opt/spark_data/spark_jobs:ro
      - ./processed_data:/opt/spark_data/processed_data
    command: [ "sleep", "infinity" ]
    networks:
      - taxi_net

  taxi-loader:
    build:
      context: ./docker/taxi-loader
    image: taxi-loader:latest
    container_name: taxi_loader_build_only
    restart: "no"
    command: ["true"]
    networks:
      - taxi_net

  taxi-dbt:
    build:
      context: ./docker/taxi-dbt
    image: taxi-dbt:latest
    container_name: taxi_dbt_build_only
    restart: "no"
    entrypoint: ["true"]
    networks:
      - taxi_net

  airflow-init:
    build:
      context: ./airflow
    image: taxi-airflow:latest
    container_name: taxi_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PG_ADMIN_DB: ${POSTGRES_ADMIN_DB}
      AIRFLOW_DB_NAME: ${AIRFLOW_DB_NAME}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW_LOAD_EXAMPLES}
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      AIRFLOW_ADMIN_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME}
      AIRFLOW_ADMIN_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL}
      # Bắt buộc phải có ở ĐÂY (không chỉ ở airflow-scheduler) vì bước 4 của
      # entrypoint-init.sh chạy `airflow dags list-import-errors` ngay trong
      # container này -- DAG đọc os.environ["HOST_PROJECT_DIR"] lúc import
      # module, thiếu biến này sẽ làm DAG fail import với KeyError.
      HOST_PROJECT_DIR: ${HOST_PROJECT_DIR}
      TAXI_DOCKER_NETWORK: ${TAXI_DOCKER_NETWORK}
    entrypoint: ["bash", "/opt/airflow/scripts/entrypoint-init.sh"]
    volumes:
      - ./airflow/scripts:/opt/airflow/scripts:ro
      - ./airflow/dags:/opt/airflow/dags:ro
      - airflow_logs:/opt/airflow/logs
    networks:
      - taxi_net

  airflow-scheduler:
    image: taxi-airflow:latest
    container_name: taxi_airflow_scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    mem_limit: ${AIRFLOW_SCHEDULER_MEM_LIMIT}
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW_EXECUTOR}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW_LOAD_EXAMPLES}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: ${AIRFLOW_EXPOSE_CONFIG}
      HOST_PROJECT_DIR: ${HOST_PROJECT_DIR}
      TAXI_DOCKER_NETWORK: ${TAXI_DOCKER_NETWORK}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: ["scheduler"]
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - taxi_net

  airflow-webserver:
    image: taxi-airflow:latest
    container_name: taxi_airflow_webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    mem_limit: ${AIRFLOW_WEBSERVER_MEM_LIMIT}
    ports:
      - "${AIRFLOW_WEBSERVER_HOST_PORT}:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW_EXECUTOR}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW_LOAD_EXAMPLES}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: ${AIRFLOW_EXPOSE_CONFIG}
    command: ["webserver"]
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - airflow_logs:/opt/airflow/logs
    networks:
      - taxi_net

networks:
  taxi_net:
    name: ${TAXI_DOCKER_NETWORK}

volumes:
  pgdata:
  metabase_data:
  pgadmin_data:
  airflow_logs: